<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NZ AI Consulting Landscape | Deep Research Report</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Plotly.js (for advanced scatter/bubble charts) -->
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- FontAwesome (for Icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F8FAFC; color: #1E293B; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Chart Container Utilities */
        .chart-container {
            position: relative;
            width: 100%;
            max-width: 100%;
            margin-left: auto;
            margin-right: auto;
            background: white;
            border-radius: 0.5rem;
            padding: 1rem;
        }

        .chart-wrapper-responsive {
            position: relative;
            height: 400px;
            width: 100%;
        }

        /* Custom Transitions */
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .tab-active { border-bottom: 2px solid #4F46E5; color: #4F46E5; font-weight: 600; }
        .tab-inactive { color: #64748B; }
        .tab-inactive:hover { color: #1E293B; }

        /* Competitor Card Styling */
        .competitor-card { transition: all 0.2s ease; border: 1px solid #E2E8F0; }
        .competitor-card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); border-color: #4F46E5; }
    </style>

    <!-- Chosen Palette: Slate (Backgrounds/Text) + Indigo (Primary Action) + Emerald (Positive/Opportunity) + Rose (Threats) -->
    <!-- Application Structure Plan: Dashboard layout with left-hand vertical navigation.
         1. Executive Summary: High-level metrics and strategic "The So What".
         2. Market Map: Interactive Scatter plot visualizing competitors by Strategic vs. Technical depth.
         3. Competitor Directory: Filterable grid of cards with modal drill-downs for deep details.
         4. Services & Pricing: Comparative tables and Radar charts.
         5. White Space Analysis: Visualizing the gap for the new agency positioning.
         Why: Allows leadership to quickly grasp the macro view (Exec Summary) then drill into specific competitors (Directory) or validate their strategy (White Space). -->
    <!-- Visualization & Content Choices:
         - Market Map (Plotly Bubble): Shows competitive density. Goal: Identify clusters.
         - Competitor Cards (HTML/JS): Detailed text data. Goal: Specific intel.
         - Radar Chart (Chart.js): Comparing capabilities. Goal: Visualize differentiation.
         - Heatmap Table (HTML/CSS): Pricing/Offering comparison. Goal: Quick scanning. -->
    <!-- CONFIRMATION: NO SVG graphics used. NO Mermaid JS used. -->
</head>
<body class="flex h-screen overflow-hidden">

    <!-- Sidebar Navigation -->
    <nav class="w-64 bg-slate-900 text-white flex flex-col flex-shrink-0 transition-all duration-300 z-20 hidden md:flex">
        <div class="p-6 border-b border-slate-700">
            <h1 class="text-xl font-bold tracking-tight">NZ AI Research</h1>
            <p class="text-xs text-slate-400 mt-1">Competitive Landscape 2025</p>
        </div>
        
        <div class="flex-1 overflow-y-auto py-4">
            <ul class="space-y-1 px-3" id="nav-links">
                <!-- Nav items injected via JS -->
            </ul>
        </div>

        <div class="p-4 border-t border-slate-700 bg-slate-800">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-full bg-indigo-500 flex items-center justify-center font-bold text-xs">DA</div>
                <div>
                    <p class="text-sm font-medium">Agency Strategy</p>
                    <p class="text-xs text-slate-400">Internal Use Only</p>
                </div>
            </div>
        </div>
    </nav>

    <!-- Mobile Header -->
    <div class="md:hidden fixed w-full bg-slate-900 text-white z-30 flex justify-between items-center p-4">
        <span class="font-bold">NZ AI Research</span>
        <button id="mobile-menu-btn" class="text-white"><i class="fas fa-bars"></i></button>
    </div>

    <!-- Main Content Area -->
    <main class="flex-1 overflow-y-auto bg-slate-50 relative p-4 md:p-8 pt-20 md:pt-8" id="main-content">
        <!-- Dynamic Content Injected Here -->
    </main>

    <!-- Modal for Detailed Views -->
    <div id="modal-overlay" class="fixed inset-0 bg-slate-900/50 z-40 hidden backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-4xl max-h-[90vh] overflow-y-auto transform transition-all" id="modal-content">
            <!-- Modal Content Injected JS -->
        </div>
    </div>

    <script>
        // --- DATA STORE ---
        const reportData = {

            competitors: [

                },

                    marketPos: { x: 8, y: 6, r: 35 } // High Tech, Mid Strategy
                },
                {
                    id: "datacom",
                    name: "Datacom",
                    type: "Enterprise SI",
                    size: "6000+",
                    focus: "Govt & Large Ent",
                    strengths: "Scale, security credentials, government contracts.",
                    weaknesses: "Slow, expensive, can lack innovation 'spark'.",
                    offering: ["Managed Services", "Infrastructure", "Governance"],
                    pricing: "Enterprise Retainer / Rate Card",
                    marketPos: { x: 7, y: 5, r: 50 } // High Tech, Mid Strategy, Huge Size
                },
                {
                    id: "innovisory",
                    name: "AI Innovisory",
                    type: "Boutique Advisory",
                    size: "1-10",
                    focus: "Strategy & Governance",
                    strengths: "Pure advisory focus, governance frameworks.",
                    weaknesses: "No build capability.",

                },
                {

                    size: "10-50",
                    focus: "SME / Mid-Market",
                    strengths: "Digital marketing roots, practical application.",
                    weaknesses: "Less 'enterprise grade' engineering.",

                },
                {

                    size: "1000+",
                    focus: "C-Suite / Enterprise",
                    strengths: "Risk/Audit integration, global IP access.",
                    weaknesses: "Very expensive, 'PowerPoint heavy'.",
                    offering: ["Transformation", "Governance", "Change Mgmt"],

                },
                {

                    name: "Qrious (Spark)",
                    type: "Data & Analytics",
                    size: "100+",
                    focus: "Data Infrastructure",
                    strengths: "Deep data engineering roots, Spark ownership.",
                    weaknesses: "More 'Big Data' than 'Agile AI Product'.",
                    offering: ["Data Platforms", "ML Ops"],
                    pricing: "Project",
                    marketPos: { x: 9, y: 4, r: 30 }
                }
            ],
            marketGaps: [
                { title: "Embedded Innovation", desc: "Most players are either 'Advisory' (Leave you with a PDF) or 'Body Shop' (Do exactly what you say). There is a lack of 'Embedded Squads' that co-create.", opportunity: "High" },
                { title: "Mid-Market Enablement", desc: "Enterprise is served by Big 4/Datacom. SMEs are served by jagged freelancers. The Mid-Market ($50M-$500M revenue) has few partners.", opportunity: "Very High" },
                { title: "Sovereign AI Tools", desc: "Specific tooling for Maori Data Sovereignty and NZ Privacy Act compliance is mentioned but rarely productised.", opportunity: "Medium" }
            ]
        };

        // --- STATE MANAGEMENT ---
        let currentState = {
            view: 'executive-summary',
            competitorFilter: 'all'
        };

        // --- DOM ELEMENTS ---
        const mainContent = document.getElementById('main-content');
        const modalOverlay = document.getElementById('modal-overlay');
        const modalContent = document.getElementById('modal-content');
        const navLinks = document.getElementById('nav-links');

        // --- NAVIGATION CONFIG ---
        const navItems = [
            { id: 'executive-summary', icon: 'fa-chart-line', label: 'Executive Summary' },
            { id: 'market-map', icon: 'fa-map', label: 'Market Landscape' },
            { id: 'competitor-deep-dive', icon: 'fa-users-viewfinder', label: 'Competitor Profiles' },
            { id: 'white-space', icon: 'fa-bullseye', label: 'Gap Analysis & Strategy' }
        ];

        // --- RENDER FUNCTIONS ---

        function renderNav() {
            navLinks.innerHTML = navItems.map(item => `
                <li>
                    <button onclick="navigate('${item.id}')" 
                        class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors ${currentState.view === item.id ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-300 hover:bg-slate-800 hover:text-white'}">
                        <i class="fas ${item.icon} w-5 text-center"></i>
                        ${item.label}
                    </button>
                </li>
            `).join('');
        }

        function navigate(viewId) {
            currentState.view = viewId;
            renderNav();
            mainContent.innerHTML = ''; // Clear content
            window[toCamelCase('render-' + viewId)](); // Dynamic function call
            window.scrollTo(0,0);
        }

        function toCamelCase(str) {
            return str.replace(/-([a-z])/g, function (g) { return g[1].toUpperCase(); });
        }

        // 1. EXECUTIVE SUMMARY VIEW
        function renderExecutiveSummary() {
            const content = `
                <div class="fade-in max-w-6xl mx-auto space-y-8">
                    <!-- Header -->
                    <div>
                        <h2 class="text-3xl font-bold text-slate-900">Executive Summary</h2>
                        <p class="mt-2 text-slate-600 max-w-3xl">
                            The New Zealand AI market is currently in a transition phase from "Education" to "Implementation." 
                            While the market is crowded with advisory voices, there is a significant scarcity of execution-capable partners who can bridge the gap between strategy and production-grade software.
                        </p>
                    </div>

                    <!-- Key Metrics Grid -->
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                        <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                            <div class="text-indigo-600 text-sm font-semibold uppercase tracking-wider mb-2">Market Maturity</div>
                            <div class="text-2xl font-bold text-slate-900">Early Majority</div>
                            <div class="text-slate-500 text-sm mt-1">SMEs are lagging, Ent is scaling</div>
                        </div>
                        <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                            <div class="text-indigo-600 text-sm font-semibold uppercase tracking-wider mb-2">Primary Demand</div>
                            <div class="text-2xl font-bold text-slate-900">Governance</div>
                            <div class="text-slate-500 text-sm mt-1">Safety & Privacy > Innovation</div>
                        </div>
                        <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                            <div class="text-indigo-600 text-sm font-semibold uppercase tracking-wider mb-2">Talent Gap</div>
                            <div class="text-2xl font-bold text-slate-900">Acute</div>
                            <div class="text-slate-500 text-sm mt-1">High cost for AI Engineers</div>
                        </div>
                        <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                            <div class="text-emerald-600 text-sm font-semibold uppercase tracking-wider mb-2">Your Opportunity</div>
                            <div class="text-2xl font-bold text-slate-900">"The Builder"</div>
                            <div class="text-slate-500 text-sm mt-1">Embedded Squads vs. Advisory</div>
                        </div>
                    </div>

                    <!-- Two Column Layout: Insights vs Trends -->
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                        
                        <!-- Insights -->
                        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
                            <h3 class="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2">
                                <i class="fas fa-lightbulb text-yellow-500"></i> Strategic Key Findings
                            </h3>
                            <ul class="space-y-4">
                                <li class="flex gap-3">
                                    <span class="flex-shrink-0 w-6 h-6 rounded-full bg-slate-100 flex items-center justify-center text-sm font-bold text-slate-600">1</span>
                                    <p class="text-sm text-slate-600"><strong>The "Big 4" are vulnerable:</strong> Clients are reporting fatigue with high-cost strategy decks that don't result in shipping code. They need execution.</p>
                                </li>
                                <li class="flex gap-3">
                                    <span class="flex-shrink-0 w-6 h-6 rounded-full bg-slate-100 flex items-center justify-center text-sm font-bold text-slate-600">2</span>
                                    <p class="text-sm text-slate-600"><strong>Microsoft Dominance:</strong> Theta and Datacom are heavily leveraging the Microsoft Copilot ecosystem. Being "Model Agnostic" or "Open Source" capable is a differentiator.</p>
                                </li>
                                <li class="flex gap-3">
                                    <span class="flex-shrink-0 w-6 h-6 rounded-full bg-slate-100 flex items-center justify-center text-sm font-bold text-slate-600">3</span>
                                    <p class="text-sm text-slate-600"><strong>The Trust Barrier:</strong> NZ businesses are conservative. SOC2/PCI compliance isn't a "nice to have," it's the gatekeeper for Enterprise entry.</p>
                                </li>
                            </ul>
                        </div>

                        <!-- Market Demand Chart -->
                        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
                            <h3 class="text-lg font-bold text-slate-800 mb-4">Client Demand Shifts (2024 vs 2025)</h3>
                            <div class="chart-wrapper-responsive h-64">
                                <canvas id="trendChart"></canvas>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            mainContent.innerHTML = content;

            // Render Chart
            const ctx = document.getElementById('trendChart').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Basic Education', 'Strategy/Governance', 'Copilot Adoption', 'Custom AI Agents', 'LLM Fine-tuning'],
                    datasets: [
                        { label: '2024 Demand', data: [80, 60, 40, 20, 5], backgroundColor: '#cbd5e1' },
                        { label: '2025 Projection', data: [30, 70, 85, 55, 15], backgroundColor: '#4F46E5' }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { position: 'bottom' } },
                    scales: { y: { beginAtZero: true, display: false } }
                }
            });
        }

        // 2. MARKET LANDSCAPE VIEW
        function renderMarketMap() {
            const content = `
                <div class="fade-in max-w-7xl mx-auto h-full flex flex-col">
                    <div class="mb-6">
                        <h2 class="text-3xl font-bold text-slate-900">Market Landscape</h2>
                        <p class="text-slate-600">Visualizing competitor positioning based on Strategic Capability vs. Technical Execution.</p>
                    </div>

                    <div class="flex-1 bg-white rounded-xl shadow-sm border border-slate-200 p-4 relative flex flex-col">
                        <div class="absolute top-4 right-4 z-10 bg-white/90 p-2 rounded text-xs border border-slate-200 shadow-sm">
                            <div class="flex items-center gap-2 mb-1"><span class="w-3 h-3 rounded-full bg-indigo-500"></span> Enterprise</div>
                            <div class="flex items-center gap-2 mb-1"><span class="w-3 h-3 rounded-full bg-teal-400"></span> Boutique</div>
                            <div class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-rose-400"></span> Data/Tech</div>
                        </div>
                        <div id="plotlyDiv" class="w-full flex-grow"></div>
                        <p class="text-xs text-center text-slate-400 mt-2">Bubble Size = Estimated Market Presence / Headcount</p>
                    </div>

                    <div class="mt-6 grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="p-4 bg-indigo-50 border-l-4 border-indigo-500 rounded-r">
                            <h4 class="font-bold text-indigo-900">The "Strategy" Corner</h4>
                            <p class="text-sm text-indigo-800 mt-1">Top-left. High advisory, low build. Dominated by Big 4 and Justin Flitter (Matrix). Great at starting conversations, weak at finishing software.</p>
                        </div>
                        <div class="p-4 bg-rose-50 border-l-4 border-rose-500 rounded-r">
                            <h4 class="font-bold text-rose-900">The "Engine Room"</h4>
                            <p class="text-sm text-rose-800 mt-1">Bottom-right. High tech, low strategy. Datacom, Qrious. They build what they are told, often lacking product innovation.</p>
                        </div>
                        <div class="p-4 bg-emerald-50 border-l-4 border-emerald-500 rounded-r">
                            <h4 class="font-bold text-emerald-900">The Opportunity Zone</h4>
                            <p class="text-sm text-emerald-800 mt-1">Top-right. High Strategy + High Execution. This is the gap for an "Embedded Squad" agency that can consult AND build.</p>
                        </div>
                    </div>
                </div>
            `;
            mainContent.innerHTML = content;

            // Prepare Plotly Data
            const trace1 = {
                x: reportData.competitors.map(c => c.marketPos.x),
                y: reportData.competitors.map(c => c.marketPos.y),
                text: reportData.competitors.map(c => c.name),
                mode: 'markers+text',
                textposition: 'top center',
                marker: {
                    size: reportData.competitors.map(c => c.marketPos.r),
                    color: reportData.competitors.map(c => {
                        if(c.type.includes('Enterprise') || c.type.includes('Big 4')) return '#6366f1'; // Indigo
                        if(c.type.includes('Boutique')) return '#2dd4bf'; // Teal
                        return '#fb7185'; // Rose
                    }),
                    opacity: 0.7
                }
            };

            const layout = {
                title: 'Strategic Depth vs. Technical Execution',
                xaxis: { title: 'Technical Execution Capability (Build)', range: [0, 10] },
                yaxis: { title: 'Strategic Advisory Capability (Think)', range: [0, 10] },
                hovermode: 'closest',
                margin: { t: 40, b: 40, l: 40, r: 20 }
            };

            Plotly.newPlot('plotlyDiv', [trace1], layout, {responsive: true, displayModeBar: false});
        }

        // 3. COMPETITOR DEEP DIVE VIEW
        function renderCompetitorDeepDive() {
            const content = `
                <div class="fade-in max-w-7xl mx-auto">
                    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
                        <div>
                            <h2 class="text-3xl font-bold text-slate-900">Competitor Profiles</h2>
                            <p class="text-slate-600">Detailed intelligence on key players.</p>
                        </div>
                        <div class="flex bg-white rounded-lg p-1 border border-slate-200 shadow-sm">
                            <button onclick="filterCompetitors('all')" class="px-4 py-1.5 rounded text-sm font-medium transition-colors hover:bg-slate-100 text-slate-600 focus:bg-indigo-100 focus:text-indigo-700">All</button>
                            <button onclick="filterCompetitors('boutique')" class="px-4 py-1.5 rounded text-sm font-medium transition-colors hover:bg-slate-100 text-slate-600 focus:bg-indigo-100 focus:text-indigo-700">Boutique</button>
                            <button onclick="filterCompetitors('enterprise')" class="px-4 py-1.5 rounded text-sm font-medium transition-colors hover:bg-slate-100 text-slate-600 focus:bg-indigo-100 focus:text-indigo-700">Enterprise</button>
                        </div>
                    </div>

                    <div id="competitor-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        <!-- Cards Injected JS -->
                    </div>
                </div>
            `;
            mainContent.innerHTML = content;
            renderCompetitorCards();
        }

        function filterCompetitors(type) {
            const grid = document.getElementById('competitor-grid');
            grid.innerHTML = ''; // Clear
            
            let filtered = reportData.competitors;
            if (type === 'boutique') filtered = filtered.filter(c => c.type.toLowerCase().includes('boutique') || c.type.includes('Pivot'));
            if (type === 'enterprise') filtered = filtered.filter(c => c.type.toLowerCase().includes('enterprise') || c.type.includes('Global') || c.type.includes('Tech'));

            filtered.forEach(comp => {
                const card = document.createElement('div');
                card.className = 'competitor-card bg-white rounded-xl p-6 cursor-pointer flex flex-col justify-between h-full';
                card.onclick = () => openModal(comp);
                card.innerHTML = `
                    <div>
                        <div class="flex justify-between items-start mb-4">
                            <h3 class="text-xl font-bold text-slate-800">${comp.name}</h3>
                            <span class="bg-slate-100 text-slate-600 text-xs px-2 py-1 rounded-full font-semibold">${comp.type}</span>
                        </div>
                        <p class="text-sm text-slate-500 mb-4"><i class="fas fa-bullseye mr-2 text-indigo-400"></i>${comp.focus}</p>
                        <div class="space-y-2 mb-6">
                            ${comp.offering.slice(0,2).map(o => `<div class="text-xs bg-slate-50 text-slate-600 px-2 py-1 rounded border border-slate-100 inline-block mr-1">${o}</div>`).join('')}
                            ${comp.offering.length > 2 ? `<span class="text-xs text-slate-400">+${comp.offering.length - 2} more</span>` : ''}
                        </div>
                    </div>
                    <div class="text-indigo-600 text-sm font-medium flex items-center gap-1 group">
                        View Profile <i class="fas fa-arrow-right transition-transform group-hover:translate-x-1"></i>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function renderCompetitorCards() {
            filterCompetitors('all'); // Initial render
        }

        function openModal(comp) {
            modalContent.innerHTML = `
                <div class="p-8">
                    <div class="flex justify-between items-start border-b border-slate-100 pb-6 mb-6">
                        <div>
                            <h2 class="text-3xl font-bold text-slate-900">${comp.name}</h2>
                            <p class="text-slate-500 mt-1">${comp.type} | Est. Size: ${comp.size}</p>
                        </div>
                        <button onclick="document.getElementById('modal-overlay').classList.add('hidden')" class="text-slate-400 hover:text-slate-600 text-2xl">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div>
                            <h4 class="font-bold text-slate-800 mb-3 text-lg">Positioning</h4>
                            <div class="bg-slate-50 p-4 rounded-lg border border-slate-100">
                                <p class="text-sm text-slate-700 leading-relaxed mb-4">
                                    <strong>Core Value:</strong> ${comp.strengths}
                                </p>
                                <p class="text-sm text-slate-700 leading-relaxed">
                                    <strong>Weakness / Gap:</strong> ${comp.weaknesses}
                                </p>
                            </div>
